# Options Trading Configuration

# Strategy Configuration
# This is the first strategy — more strategies can be added in future
strategy:
  name: "short_straddle"
  underlying: "BTC"           # Change to "ETH" or other supported assets in future
  entry_time: "17:00"         # IST — daily entry time
  exit_time: "17:30"          # IST — daily expiry / settlement time
  timezone: "Asia/Kolkata"    # IST
  capital_allocation_pct: 80   # % of available wallet balance to deploy per trade
  option_margin_requirement_pct: 10.0 # 10% of underlying notional required as margin per contract leg
  lot_size: null              # Enable dynamic lot sizing (null)
  max_lot_size: 1000          # Capped at maximum of 1,000 lots per leg
  leverage: 200               # 200x leverage
  order_type: "market_order"  # Market orders for instant fill
  skip_weekends: true         # Skip trading on Saturdays and Sundays (UTC/IST)

  # Combined Stop-Loss Configuration
  stop_loss: null

  # Monitoring
  monitor_interval_sec: 30     # Poll interval during SL monitoring (seconds)

# Notification Settings
notifications:
  discord_enabled: true
  alert_on_entry: true
  alert_on_exit: true
  alert_on_sl_hit: true
  alert_on_error: true

# Firestore Configuration (for trade journaling)
# Uses the same Firebase project as the futures bot
# Data is stored in the "options" collection
# mode: 'live' (production) or 'paper' (testnet)
firestore:
  enabled: true
  service_account_path: "config/firestore-service-account.json"
  collection_name: "options"
